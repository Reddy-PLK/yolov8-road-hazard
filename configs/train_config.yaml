# Training hyperparameters
# CSE3240 - Computer Vision | Vashisht Reddy | 23FE10CSE00256

# Core settings
epochs: 100
batch: 16
imgsz: 640
device: 0          # GPU device index; 'cpu' for CPU

# Optimizer
optimizer: SGD
lr0: 0.01          # Initial learning rate
lrf: 0.0001        # Final LR (cosine decay target)
momentum: 0.937
weight_decay: 0.0005

# Augmentation
hsv_h: 0.015       # Hue shift
hsv_s: 0.7         # Saturation
hsv_v: 0.4         # Value/brightness
degrees: 0.0       # Rotation
translate: 0.1     # Translate ±10%
scale: 0.5         # Scale factor range
fliplr: 0.5        # Horizontal flip probability
mosaic: 0.5        # Mosaic augmentation probability
mixup: 0.0

# Regularization
dropout: 0.0

# Early stopping
patience: 20

# Logging
save: true
save_period: -1    # Only save best + last
plots: true
verbose: true
